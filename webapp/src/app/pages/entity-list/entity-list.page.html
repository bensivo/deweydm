<div class="entity-list-container">
  <div *ngIf="entity$()" class="entity-list">
    <!-- Header -->
    <div class="list-header">
      <h1>{{ entity$()!.pluralName }}</h1>
      <div class="header-buttons">
        <button nz-button nzSize="large" (click)="onClickBulkCreateButton()">Bulk Create</button>
        <button nz-button nzType="primary" nzSize="large" (click)="onClickNewButton()">+ New</button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="list-toolbar">
      <input
        nz-input
        class="search-input"
        nzSize="large"
        placeholder="Search..."
        type="text"
        (input)="onFilterChange($event)"
        [value]="filterTextSignal()" />
      <button nz-button nzSize="large" (click)="onClickColumnsButton()">Columns</button>
      <button nz-button nzSize="large" (click)="onClickFilterToggleButton()">
        <i nz-icon nzType="filter" nzTheme="outline"></i>
        Filters
      <div class="toolbar-filters-badge" *ngIf="getFiltersSignal()().length > 0">
        <span class="badge">{{ getFiltersSignal()().length }}</span>
      </div>
      </button>
      <button
        nz-button
        nzSize="large"
        nz-dropdown
        [nzDropdownMenu]="addToListMenu"
        nzTrigger="click"
        [disabled]="selectedRecordIdsSignal().size === 0">
        Add to List
        <i nz-icon nzType="down" nzTheme="outline"></i>
      </button>
    </div>

    <!-- Filters Section -->
    <!-- <div class="filters-section" *ngIf="isFiltersVisibleSignal() || getFiltersSignal()().length > 0"> -->
    <div class="filters-section" *ngIf="isFiltersVisibleSignal()">
      <div class="filter-rows">
        <div *ngFor="let filter of getFiltersSignal()()" class="filter-row">
          <!-- Field Selector Dropdown -->
          <nz-select
            class="filter-field-select"
            [(ngModel)]="filter.fieldId"
            (ngModelChange)="onFilterFieldChange(filter.id, $event)">
            <nz-option *ngFor="let field of entity$()!.fields"
              [nzLabel]="field.name"
              [nzValue]="field.id">
            </nz-option>
          </nz-select>

          <!-- Operator Selector Dropdown -->
          <nz-select
            class="filter-operator-select"
            [(ngModel)]="filter.operator"
            (ngModelChange)="onFilterOperatorChange(filter.id, $event)">
            <nz-option *ngFor="let op of filterService.getFilterOperatorsForFieldType(getFieldById(filter.fieldId)!.type)"
              [nzLabel]="getOperatorLabel(op)"
              [nzValue]="op">
            </nz-option>
          </nz-select>

          <!-- Value Input (varies by field type and operator) -->
          <!-- Text input for text fields -->
          <input
            *ngIf="isTextFieldType(getFieldById(filter.fieldId)!.type) && !isEmptyOperator(filter.operator)"
            nz-input
            class="filter-value-input"
            type="text"
            [(ngModel)]="filter.value"
            (blur)="onFilterValueChange(filter.id, filter.value)" />

          <!-- Number input for number fields -->
          <input
            *ngIf="getFieldById(filter.fieldId)!.type === 'number' && !isEmptyOperator(filter.operator)"
            nz-input
            class="filter-value-input"
            type="number"
            [(ngModel)]="filter.value"
            (blur)="onFilterValueChange(filter.id, filter.value)" />

          <!-- Reference selector (dropdown) -->
          <nz-select
            *ngIf="isReferenceFieldType(getFieldById(filter.fieldId)!.type) && !isEmptyOperator(filter.operator)"
            class="filter-value-select"
            [(ngModel)]="filter.value"
            (ngModelChange)="onFilterValueChange(filter.id, $event)">
            <nz-option *ngFor="let option of getReferenceFilterOptions(getFieldById(filter.fieldId)!)"
              [nzLabel]="option.label"
              [nzValue]="option.id">
            </nz-option>
          </nz-select>

          <!-- Option selector (dropdown) -->
          <nz-select
            *ngIf="getFieldById(filter.fieldId)!.type === 'option' && !isEmptyOperator(filter.operator)"
            class="filter-value-select"
            [(ngModel)]="filter.value"
            (ngModelChange)="onFilterValueChange(filter.id, $event)">
            <nz-option *ngFor="let optionValue of getFieldById(filter.fieldId)!.optionValues || []"
              [nzLabel]="optionValue"
              [nzValue]="optionValue">
            </nz-option>
          </nz-select>

          <!-- Remove Button -->
          <button nz-button nzType="text" nzDanger (click)="onClickRemoveFilterButton(filter.id)">
            <i nz-icon nzType="close" nzTheme="outline"></i>
          </button>
        </div>
      </div>

      <div class="filters-footer">
        <button nz-button nzType="default" (click)="onClickAddFilterButton()">
          {{ getFiltersSignal()().length > 0 ? '+ Add Another Filter' : '+ Add Filter' }}
        </button>
      </div>
    </div>

    <!-- Add to List Dropdown Menu -->
    <nz-dropdown-menu #addToListMenu="nzDropdownMenu">
      <ul nz-menu>
        <li nz-menu-item *ngFor="let list of lists$()" (click)="onAddSelectedItemsToList(list.id)">
          {{ list.name }}
        </li>
      </ul>
    </nz-dropdown-menu>

    <!-- Records Table -->
    <nz-table
      #recordTable
      [nzData]="filteredAndSortedRecords$()"
      [nzShowPagination]="filteredAndSortedRecords$().length > 10"
      nzSize="small"
      class="records-table">
      <thead>
        <tr>
          <th class="checkbox-col"></th>
          <th
            *ngFor="let field of visibleFields$()"
            (click)="onColumnHeaderClick(field.id)"
            class="sortable-header"
            [class.sorted]="sortFieldIdSignal() === field.id && sortOrderSignal() !== null">
            <span>{{ field.name }}</span>
            <span class="sort-indicator" *ngIf="sortFieldIdSignal() === field.id && sortOrderSignal() !== null">
              {{ sortOrderSignal() === 'asc' ? '▲' : '▼' }}
            </span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let record of recordTable.data"
          class="record-row"
          (click)="onClickRecordRow(record.id)">
          <td class="checkbox-col" (click)="$event.stopPropagation()">
            <label nz-checkbox
              [nzChecked]="isRecordSelected(record.id)"
              (nzCheckedChange)="onToggleRecordSelection(record.id, $event)">
            </label>
          </td>
          <td *ngFor="let field of visibleFields$()">
            <!-- Reference field: single link -->
            <app-entity-reference *ngIf="isReferenceField(field) && record.data[field.id]"
              [recordId]="record.data[field.id]"
              (click)="$event.stopPropagation()">
            </app-entity-reference>
            <!-- Reference-list field: multiple links -->
            <div *ngIf="isReferenceListField(field) && record.data[field.id]" class="reference-list-items">
              <app-entity-reference *ngFor="let item of getRefListItems(field, record)"
                [recordId]="item.id"
                class="reference-list-item"
                (click)="$event.stopPropagation()">
              </app-entity-reference>
            </div>
            <!-- All other fields: plain text -->
            <span *ngIf="!isReferenceField(field) && !isReferenceListField(field)">
              {{ getFieldDisplayValue(field, record) }}
            </span>
            <!-- Empty reference or reference-list: dash -->
            <span *ngIf="(isReferenceField(field) || isReferenceListField(field)) && !record.data[field.id]">—</span>
          </td>
        </tr>
      </tbody>
    </nz-table>

    <!-- Column Selection Modal -->
    <nz-modal
      [(nzVisible)]="columnModalState.isOpen$"
      nzTitle="Select Columns"
      (nzOnOk)="onConfirmColumns()"
      (nzOnCancel)="onCancelColumns()">
      <ng-container *nzModalContent>
        <div class="column-checkbox-list">
          <div *ngFor="let field of entity$()!.fields" class="column-checkbox-item">
            <label nz-checkbox
              [nzChecked]="isPendingFieldVisible(field.id)"
              (nzCheckedChange)="onTogglePendingColumn(field.id, $event)">
              {{ field.name }}
            </label>
          </div>
        </div>
      </ng-container>
    </nz-modal>
  </div>
</div>
