<div class="lists-add-items-container">
    <div *ngIf="list$()" class="add-items-page">
        <div class="add-items-header">
            <h1>Add Items to {{ list$()!.name }}</h1>
            <button nz-button nzSize="large" (click)="onClickCancel()">Cancel</button>
        </div>

        <div class="add-items-content">
            <div class="controls-row">
                <nz-select
                    [(ngModel)]="selectedEntityIdSignal"
                    nzPlaceHolder="Select entity type"
                    class="entity-select">
                    <nz-option
                        *ngFor="let entity of allEntities$()"
                        [nzValue]="entity.id"
                        [nzLabel]="entity.pluralName">
                    </nz-option>
                </nz-select>

                <input
                    nz-input
                    type="text"
                    [(ngModel)]="searchQuerySignal"
                    nzPlaceHolder="Search records..."
                    class="search-input" />
            </div>

            <div class="records-container">
                <nz-empty
                    *ngIf="selectedEntityIdSignal() === '' || filteredRecords$().length === 0"
                    nzNotFoundContent="No entity selected or no results found">
                </nz-empty>

                <div
                    *ngIf="selectedEntityIdSignal() !== '' && filteredRecords$().length > 0"
                    class="records-list">
                    <div *ngFor="let record of filteredRecords$()" class="record-item">
                        <label nz-checkbox
                            [ngModel]="isRecordSelected(record.id)"
                            (ngModelChange)="onToggleRecord(record.id, $event)">
                            {{ getRecordDisplayName(record.id) }}
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="add-items-footer">
            <button
                nz-button
                nzSize="large"
                nzType="primary"
                [disabled]="selectedCount === 0"
                (click)="onClickAddSelected()">
                Add Selected ({{ selectedCount }})
            </button>
        </div>
    </div>
</div>
